name: Dev Container Compatibility Tests (Fedora)

on:
  workflow_dispatch:  # Manual trigger only (to control costs)
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

env:
  GCP_PROJECT: podman-devcontainer-test
  GCP_ZONE: us-central1-a
  VM_NAME: fedora-runner-${{ github.run_id }}

jobs:
  test-on-fedora:
    name: Test on Fedora (GCE)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/gce_key -N '' -q
      
      - name: Create Fedora CoreOS VM
        run: |
          gcloud compute instances create ${{ env.VM_NAME }} \
            --project=${{ env.GCP_PROJECT }} \
            --zone=${{ env.GCP_ZONE }} \
            --machine-type=e2-medium \
            --image-family=fedora-coreos-stable \
            --image-project=fedora-coreos-cloud \
            --boot-disk-size=30GB \
            --metadata=ssh-keys="core:$(cat ~/.ssh/gce_key.pub)"
          
          EXTERNAL_IP=$(gcloud compute instances describe ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM_IP=$EXTERNAL_IP" >> $GITHUB_ENV
      
      - name: Wait for SSH
        run: |
          echo "Waiting for SSH..."
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/gce_key core@${{ env.VM_IP }} "echo OK" 2>/dev/null; then
              echo "SSH ready"
              break
            fi
            sleep 5
          done
      
      - name: Setup environment on Fedora VM
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            echo "=== Environment ==="
            cat /etc/os-release | head -3
            podman --version
            
            echo "=== Installing Node.js via nvm ==="
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm install --lts
            node --version
            npm --version
            
            echo "=== Installing devcontainers CLI ==="
            npm install -g @devcontainers/cli
            devcontainer --version
            
            echo "=== Configure Podman ==="
            mkdir -p ~/.config/containers
            echo "unqualified-search-registries = [\"docker.io\"]" > ~/.config/containers/registries.conf
            
            echo "=== Cloning repository ==="
            git clone https://github.com/tnk4on/podman-devcontainer-test.git
          '
      
      - name: Run Test - Minimal
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Minimal ==="
            cd ~/podman-devcontainer-test/tests/minimal
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Run Test - Dockerfile
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Dockerfile ==="
            cd ~/podman-devcontainer-test/tests/dockerfile
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            
            # Validate curl is installed
            podman exec "$CONTAINER_ID" curl --version
            
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Run Test - Features (Go)
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Features (Go) ==="
            cd ~/podman-devcontainer-test/tests/features-go
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            
            # Validate Go is installed
            podman exec "$CONTAINER_ID" go version
            
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Run Test - Docker in Docker
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Docker in Docker ==="
            cd ~/podman-devcontainer-test/tests/docker-in-docker
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            
            # Wait for Docker daemon
            sleep 5
            
            # Validate Docker works inside container
            podman exec "$CONTAINER_ID" docker run --rm hello-world
            
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Run Test - Sample Python
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Sample Python ==="
            cd ~/podman-devcontainer-test/tests/sample-python
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            
            # Validate Python is installed
            podman exec "$CONTAINER_ID" python3 --version
            
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Run Test - Sample Node.js
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Sample Node.js ==="
            cd ~/podman-devcontainer-test/tests/sample-node
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            
            # Validate Node.js is installed
            podman exec "$CONTAINER_ID" node --version
            
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Run Test - Sample Go
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/gce_key core@${{ env.VM_IP }} '
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            echo "=== Test: Sample Go ==="
            cd ~/podman-devcontainer-test/tests/sample-go
            OUTPUT=$(devcontainer up --workspace-folder . --docker-path podman 2>&1)
            echo "$OUTPUT"
            CONTAINER_ID=$(echo "$OUTPUT" | grep -o "\"containerId\":\"[^\"]*\"" | cut -d"\"" -f4 | head -1)
            echo "Container ID: $CONTAINER_ID"
            
            # Validate Go is installed
            podman exec "$CONTAINER_ID" go version
            
            podman rm -f "$CONTAINER_ID" || true
            echo "PASSED"
          '
      
      - name: Delete Fedora VM
        if: always()
        run: |
          gcloud compute instances delete ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --quiet || true
