name: Dev Container Compatibility Tests

on:
  workflow_dispatch:
    inputs:
      run_fedora:
        description: 'Also run Fedora tests'
        required: false
        default: 'true'
        type: boolean

  schedule:
    - cron: '0 0 * * *'  # Daily

  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'

  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write
  issues: write

env:
  PODMAN_VERSION_FILE: .podman-version
  DEVCONTAINER_CLI_VERSION_FILE: .devcontainer-cli-version

jobs:
  check-versions:
    name: Check Versions
    runs-on: ubuntu-latest
    outputs:
      podman_updated: ${{ steps.check.outputs.podman_updated }}
      devcontainer_updated: ${{ steps.check.outputs.devcontainer_updated }}
      podman_version: ${{ steps.check.outputs.podman_version }}
      devcontainer_version: ${{ steps.check.outputs.devcontainer_version }}
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4

      - name: Check versions
        id: check
        run: |
          PODMAN_LATEST=$(curl -s https://api.github.com/repos/containers/podman/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          DEVCONTAINER_LATEST=$(npm view @devcontainers/cli version)
          
          PODMAN_UPDATED="false"
          DEVCONTAINER_UPDATED="false"
          
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ -f "${{ env.PODMAN_VERSION_FILE }}" ]; then
              [ "$(cat ${{ env.PODMAN_VERSION_FILE }})" != "$PODMAN_LATEST" ] && PODMAN_UPDATED="true"
            else
              PODMAN_UPDATED="true"
            fi
            if [ -f "${{ env.DEVCONTAINER_CLI_VERSION_FILE }}" ]; then
              [ "$(cat ${{ env.DEVCONTAINER_CLI_VERSION_FILE }})" != "$DEVCONTAINER_LATEST" ] && DEVCONTAINER_UPDATED="true"
            else
              DEVCONTAINER_UPDATED="true"
            fi
          fi
          
          SHOULD_RUN="false"
          [ "${{ github.event_name }}" != "schedule" ] && SHOULD_RUN="true"
          [ "$PODMAN_UPDATED" == "true" ] && SHOULD_RUN="true"
          [ "$DEVCONTAINER_UPDATED" == "true" ] && SHOULD_RUN="true"
          
          echo "podman_updated=$PODMAN_UPDATED" >> $GITHUB_OUTPUT
          echo "devcontainer_updated=$DEVCONTAINER_UPDATED" >> $GITHUB_OUTPUT
          echo "podman_version=$PODMAN_LATEST" >> $GITHUB_OUTPUT
          echo "devcontainer_version=$DEVCONTAINER_LATEST" >> $GITHUB_OUTPUT
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

  call-ubuntu:
    name: Ubuntu
    needs: check-versions
    if: needs.check-versions.outputs.should_run == 'true'
    uses: ./.github/workflows/test-ubuntu.yml
    with:
      podman_version: ${{ needs.check-versions.outputs.podman_version }}
      devcontainer_version: ${{ needs.check-versions.outputs.devcontainer_version }}

  call-fedora:
    name: Fedora
    needs: check-versions
    if: |
      needs.check-versions.outputs.should_run == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_fedora == 'true')
    uses: ./.github/workflows/test-fedora.yml
    secrets: inherit
    with:
      podman_version: ${{ needs.check-versions.outputs.podman_version }}
      devcontainer_version: ${{ needs.check-versions.outputs.devcontainer_version }}

  finalize:
    name: Finalize
    needs: [check-versions, call-ubuntu, call-fedora]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Update version cache
        if: github.event_name == 'schedule' && needs.call-ubuntu.result == 'success'
        run: |
          echo "${{ needs.check-versions.outputs.podman_version }}" > ${{ env.PODMAN_VERSION_FILE }}
          echo "${{ needs.check-versions.outputs.devcontainer_version }}" > ${{ env.DEVCONTAINER_CLI_VERSION_FILE }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.PODMAN_VERSION_FILE }} ${{ env.DEVCONTAINER_CLI_VERSION_FILE }}
          git commit -m "Update version cache [skip ci]" || true
          git push || true

      - name: Notify
        if: |
          needs.call-ubuntu.result == 'failure' ||
          needs.call-fedora.result == 'failure' ||
          needs.check-versions.outputs.podman_updated == 'true' ||
          needs.check-versions.outputs.devcontainer_updated == 'true' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'tracking'
            });
            let issue = issues.data.find(i => i.title === '📊 Test Results Tracking');
            if (!issue) {
              issue = (await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '📊 Test Results Tracking',
                body: 'Automated test results.', labels: ['tracking']
              })).data;
            }
            
            const ubuntu = '${{ needs.call-ubuntu.result }}';
            const fedora = '${{ needs.call-fedora.result }}';
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            
            const reasons = [];
            if (ubuntu === 'failure' || fedora === 'failure') reasons.push('Failed');
            if ('${{ needs.check-versions.outputs.podman_updated }}' === 'true') reasons.push('New Podman');
            if ('${{ needs.check-versions.outputs.devcontainer_updated }}' === 'true') reasons.push('New CLI');
            if ('${{ github.event_name }}' === 'workflow_dispatch') reasons.push('Manual');
            if ('${{ github.event_name }}' === 'push') reasons.push('Push');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              body: `### ${new Date().toISOString()}
              | Ubuntu | Fedora | Reason | Podman | CLI |
              |--------|--------|--------|--------|-----|
              | ${icon(ubuntu)} | ${icon(fedora)} | ${reasons.join(', ')} | ${{ needs.check-versions.outputs.podman_version }} | ${{ needs.check-versions.outputs.devcontainer_version }} |
              [Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
